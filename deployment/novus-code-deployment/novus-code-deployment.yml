apiVersion: apps/v1
kind: Deployment
metadata:
  name: novus-code-deployment
  labels:
    app: novus-code
spec:
  replicas: 2
  selector:
    matchLabels:
      app: novus-code
  template:
    metadata:
      labels:
        app: novus-code
    spec:
      containers:
        - name: novus-code-container
          image: novus02/novus-code:v10
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: novus-code-config
            - secretRef:
                name: novus-code-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
